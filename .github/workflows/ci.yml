name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check
        run: node --check src/cli.js

      - name: Doctor
        run: node ./src/cli.js doctor --config ./test/ci.config.json

      - name: Smoke test
        run: npm run test:smoke

      - name: Package smoke test
        run: npm run test:package
